# Lefthook — multi-language pre-commit hooks.
# https://github.com/evilmartians/lefthook
#
# Install once: `lefthook install` (or `bunx lefthook install`).

pre-commit:
  parallel: true
  commands:
    biome-ts:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    mosaic-canonical:
      glob: "*.mosaic"
      run: |
        if [ -x tools/mosaic-canonical.mjs ]; then
          node tools/mosaic-canonical.mjs --check {staged_files}
        else
          echo "tools/mosaic-canonical.mjs not present yet — skipping."
        fi

commit-msg:
  commands:
    conventional-commit:
      run: |
        # Loosely enforce Conventional Commits. Doesn't block; nudges.
        if ! grep -qE '^(feat|fix|docs|chore|refactor|test|spec|build|ci|perf|revert)(\(.+\))?: ' {1}; then
          echo "::warning::Commit message doesn't look like Conventional Commits (feat:/fix:/docs:/...)"
          echo "::warning::See CONTRIBUTING.md."
        fi
