name: Docs

on:
  push:
    branches: [main]
    paths:
      - "schema/**"
      - "docs/**"
      - "skills/**"
      - "*.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "schema/**"
      - "docs/**"
      - "skills/**"
      - "*.md"

permissions:
  contents: read

jobs:
  schema-validate:
    name: JSON Schema sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install ajv-cli
        run: npm install -g ajv-cli@5

      - name: Validate schemas compile
        run: |
          ajv compile --spec=draft2020 -s schema/mosaic-v1.schema.json
          ajv compile --spec=draft2020 -s schema/host-manifest.schema.json
          ajv compile --spec=draft2020 -s schema/primitives.schema.json

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            docs/**/*.md
            skills/**/*.md
            .github/*.md
            README.md
            ARCHITECTURE.md
            ROADMAP.md
            CHANGELOG.md
