name: Spec issue
description: Report a problem with the Mosaic proposal or a spec — contradiction, under-specification, error.
title: "[spec] "
labels: ["spec"]
body:
  - type: markdown
    attributes:
      value: |
        Spec bugs are the most valuable thing you can file against this repo. Thanks.
        Please cite the section number from the [proposal](../blob/main/docs/proposal.md) (e.g. §3.4, §7.1) or the spec id (e.g. 0203).

  - type: input
    id: section
    attributes:
      label: Section or spec
      description: Which proposal section or spec id does this affect?
      placeholder: "§3.4"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What's wrong, contradictory, or under-specified? Quote the exact text if possible.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed fix (optional)
      description: How would you rewrite or extend the spec to address this?

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - editorial (typo, wording)
        - clarification (text is technically right but ambiguous)
        - bug (text leads to wrong implementations)
        - breaking (forces a major version bump)
    validations:
      required: true
